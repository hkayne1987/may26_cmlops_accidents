name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install UV
        uses: astral-sh/setup-uv@v4
        
      - name: Set up Python
        run: uv python install 3.10
        
      - name: Install dependencies
        run: uv sync --extra dev
        
      - name: Run tests
        run: pytest tests/ --cov=src
        
      - name: Type check
        run: mypy src/
        
      - name: Lint
        run: ruff check src/

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install UV
        uses: astral-sh/setup-uv@v4
        
      - name: Set up Python
        run: uv python install 3.10
        
      - name: Install dependencies
        run: uv sync --extra dev
        
      - name: Check formatting
        run: black --check src/
        
      - name: Run ruff
        run: ruff check src/