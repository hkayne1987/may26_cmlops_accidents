<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLOps Project · Kick-Off</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;background:#0D1929;color:#F5F5F5;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;display:flex;align-items:center;justify-content:center}
  .container{text-align:center;max-width:600px;padding:2rem}
  h1{font-family:"Playfair Display",Georgia,serif;font-weight:700;font-size:clamp(2rem,5vw,4rem);letter-spacing:-.02em;margin-bottom:.5rem}
  p{opacity:.65;margin-bottom:2.5rem;font-size:1.1rem;line-height:1.5}
  .lang{display:flex;gap:1.5rem;justify-content:center;flex-wrap:wrap}
  .lang a{display:inline-flex;align-items:center;gap:.6rem;padding:.8rem 2rem;border-radius:999px;text-decoration:none;font-weight:600;font-size:1rem;transition:all .2s}
  .lang .fr{background:#F97516;color:#0D1929}
  .lang .en{background:rgba(255,255,255,.1);color:#F5F5F5;border:1px solid rgba(255,255,255,.2)}
  .lang a:hover{transform:translateY(-2px)}
  .lang .fr:hover{background:#e06a12}
  .lang .en:hover{background:rgba(255,255,255,.18)}
  .meta{margin-top:3rem;font-size:.8rem;opacity:.4;letter-spacing:.1em;text-transform:uppercase}
</style>
</head>
<body>
  <div class="container">
    <h1>MLOps Project<br>Kick-Off</h1>
    <p>Choose your language &middot; Choisissez votre langue</p>
    <div class="lang">
      <a href="fr/" class="fr">Fran&ccedil;ais</a>
      <a href="en/" class="en">English</a>
    </div>
    <div class="meta">S&eacute;bastien Sime &middot; Liora &middot; 2026</div>
  </div>
</body>
</html>
